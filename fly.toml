# fly.toml app configuration file generated for exhibitvote on 2026-05-01T06:02:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'exhibitvote'
primary_region = 'ams'

[build]

[env]
  DB_PATH = '/data/exhibitvote.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'exhibitvote_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
